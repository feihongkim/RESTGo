# grid_example.yaml — 그리드 테스트 예시
# 사용: ./RESTGo stock gridtest rules/grid_example.yaml zpicture/grid_results.json
#
# Stage 1: 조합 스크리닝 예시 (T03 전략 파라미터 스윕)

# base_strategy: rules/strategy3.yaml   # 베이스 전략 (룰 + 기본 settings를 여기서 로드)
# markets: [KRW-BTC, KRW-ETH]           # 백테스트 대상 마켓 (Upbit 암호화폐)
# days: 1000                            # 마켓당 조회할 15분봉 개수
# workers: 8                            # 병렬 워커 고루틴 수
# params:                               # ← 여기가 핵심: 스윕할 파라미터들
#   ADXTrendThreshold:    [15, 20, 25]
#   VolumeZScoreThreshold:[1.5, 2.0, 2.5]
#   PerCandleCooldownBars:[4, 8, 16]

base_strategy: rules/strategy3.yaml
markets:
  - KRW-BTC
  - KRW-ETH
days: 1000
workers: 8

params:
  ADXTrendThreshold:
    - 15
    - 20
    - 25
  VolumeZScoreThreshold:
    - 1.5
    - 2.0
    - 2.5
  PerCandleCooldownBars:
    - 4
    - 8
    - 16
